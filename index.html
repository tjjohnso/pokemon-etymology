<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké-Etymology Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; background: #f0f2f5; }
        .pokemon-card { transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .type-fire { background-color: #ff9c54; }
        .type-water { background-color: #4e9aff; }
        .type-grass { background-color: #63bb5b; }
        .type-electric { background-color: #f3d23b; }
        .type-psychic { background-color: #f97176; }
        .type-ice { background-color: #74cec0; }
        .type-dragon { background-color: #0a6dc4; }
        .type-dark { background-color: #5a5366; }
        .type-fairy { background-color: #ec8fe6; }
        .type-normal { background-color: #9099a1; }
        .type-fighting { background-color: #ce4069; }
        .type-flying { background-color: #8fa8dd; }
        .type-poison { background-color: #ab6ac8; }
        .type-ground { background-color: #d97746; }
        .type-rock { background-color: #c7b78b; }
        .type-bug { background-color: #90c12c; }
        .type-ghost { background-color: #5269ac; }
        .type-steel { background-color: #5a8ea1; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-10 bg-gradient-to-br from-red-100 to-blue-100">

    <!-- Header -->
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">Poké-Etymology</h1>
        <p class="text-gray-600">Discover the hidden meanings behind Pokémon names</p>
    </div>

    <!-- Search Section -->
    <div class="w-full max-w-md mb-8 flex gap-2">
        <input type="text" id="pokemonInput" placeholder="Enter name (e.g. Pikachu, Bulbasaur...)" 
            class="flex-1 p-3 rounded-xl border-2 border-white shadow-sm focus:outline-none focus:border-blue-400">
        <button onclick="searchPokemon()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">
            Reveal
        </button>
    </div>

    <!-- Result Display -->
    <div id="resultArea" class="hidden w-full max-w-2xl">
        <div id="mainCard" class="glass rounded-3xl p-8 shadow-2xl pokemon-card border border-white flex flex-col md:flex-row items-center gap-8">
            
            <!-- Left Side: Image & Types -->
            <div class="flex flex-col items-center">
                <div id="imageWrapper" class="w-48 h-48 bg-white rounded-full flex items-center justify-center shadow-inner mb-4">
                    <img id="pokeImg" src="" alt="Pokemon" class="w-40 h-40 object-contain drop-shadow-xl">
                </div>
                <div id="typeBadges" class="flex gap-2">
                    <!-- Badges injected here -->
                </div>
            </div>

            <!-- Right Side: Etymology -->
            <div class="flex-1 text-center md:text-left">
                <h2 id="pokeName" class="text-5xl font-black capitalize mb-1 text-gray-800"></h2>
                <div id="pokeId" class="text-gray-400 font-mono mb-4"></div>
                
                <div class="bg-white/50 rounded-2xl p-6 border border-white">
                    <h3 class="text-lg font-bold text-gray-700 mb-2">Name Origin:</h3>
                    <p id="etymologyText" class="text-gray-600 leading-relaxed italic"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading/Error -->
    <div id="statusMsg" class="mt-4 text-gray-500 font-medium"></div>

    <script>
        // A curated database of etymologies (PokeAPI doesn't provide this text, so we map it here)
        const etymologyDB = {
            "bulbasaur": "A combination of **bulb** (the plant on its back) and **saur** (Greek for lizard/dinosaur).",
            "ivysaur": "A combination of **ivy** (the flowering plant) and **saur** (Greek for lizard/dinosaur).",
            "venusaur": "A combination of **Venus** (referring to the Venus Flytrap) and **saur** (Greek for lizard/dinosaur).",
            "charmander": "A portmanteau of **char** (to burn) and **salamander** (a mythical fire-dwelling creature).",
            "charmeleon": "A combination of **char** (burn) and **chameleon**.",
            "charizard": "A combination of **char** (burn) and **lizard**.",
            "squirtle": "A mix of **squirt** (to spray water) and **turtle**.",
            "wartortle": "A combination of **war**, **tortoise**, and **turtle**.",
            "blastoise": "A combination of **blast** (referring to its water cannons) and **tortoise**.",
            "pikachu": "A combination of **pika** (the Japanese sound for a spark) and **chu** (the Japanese sound for a mouse's squeak).",
            "eevee": "Derived from the pronunciation of the letters **E** and **V**, the first two letters of the word **evolution**.",
            "snorlax": "A portmanteau of **snore** and **relax**.",
            "lucario": "Possibly a partial reversal of the Japanese transliteration of **oracle** (orakuru) or a reference to **lupus** (Latin for wolf).",
            "gengar": "Likely derived from **doppelgänger**, a ghostly double of a living person.",
            "mewtwo": "A literal description of being the second **Mew**, created via cloning.",
            "gyarados": "Likely from the Japanese 'gyakkyō' (adversity) and 'arashi' (storm).",
            "psyduck": "A simple combination of **psychic** and **duck**.",
            "jigglypuff": "A combination of **jiggly** (the way it moves) and **puff** (it inflates like a balloon).",
            "meowth": "Derived from **meow**, the sound a cat makes.",
            "alakazam": "Named after the famous **magic incantation** often used by stage magicians.",
            "abra": "Named after the first part of the magic phrase **Abra-kadabra**.",
            "kadabra": "Named after the second part of the magic phrase **Abra-kadabra**.",
            "umbreon": "A combination of **umbra** (Latin for shadow/the darkest part of an eclipse) and **eon** (the suffix used for all Eevee evolutions).",
            "sylveon": "From **sylph** (a mythological forest spirit) and **eon**.",
            "mimikyu": "A play on the phrase **'mimic you'**, referring to its disguise as Pikachu.",
            "greninja": "A portmanteau of **grenouille** (French for frog) and **ninja**.",
            "rayquaza": "Likely a combination of **ray** and **quasar**.",
            "lugia": "Possibly derived from **lugeo** (Latin for to lie dormant) or **deluge** (a great flood).",
            "articuno": "A combination of **arctic** and **uno** (Spanish for one, as it is the first legendary bird)."
        };

        async function searchPokemon() {
            const input = document.getElementById('pokemonInput').value.toLowerCase().trim();
            const resultArea = document.getElementById('resultArea');
            const statusMsg = document.getElementById('statusMsg');
            
            if (!input) return;

            statusMsg.innerText = "Searching the Pokedex...";
            resultArea.classList.add('hidden');

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${input}`);
                if (!response.ok) throw new Error("Pokemon not found");
                
                const data = await response.json();
                displayPokemon(data);
                statusMsg.innerText = "";
            } catch (error) {
                statusMsg.innerText = "❌ Pokémon not found. Try 'Pikachu' or 'Bulbasaur'.";
            }
        }

        function displayPokemon(data) {
            const name = data.name;
            const img = data.sprites.other['official-artwork'].front_default;
            const id = data.id;
            const types = data.types;

            document.getElementById('pokeName').innerText = name;
            document.getElementById('pokeImg').src = img;
            document.getElementById('pokeId').innerText = `#${id.toString().padStart(3, '0')}`;
            
            // Handle Etymology
            const etyText = etymologyDB[name] || "We are still researching the linguistic roots of this specific Pokémon! It likely comes from a combination of its elemental type and physical characteristics.";
            document.getElementById('etymologyText').innerHTML = etyText;

            // Handle Types
            const typeContainer = document.getElementById('typeBadges');
            typeContainer.innerHTML = '';
            types.forEach(t => {
                const span = document.createElement('span');
                span.className = `type-${t.type.name} text-white text-xs font-bold px-4 py-1 rounded-full uppercase shadow-sm`;
                span.innerText = t.type.name;
                typeContainer.appendChild(span);
            });

            // Show UI
            const resultArea = document.getElementById('resultArea');
            resultArea.classList.remove('hidden');
            resultArea.classList.add('animate-in', 'fade-in', 'duration-500');
        }

        // Allow 'Enter' key to search
        document.getElementById('pokemonInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchPokemon();
            }
        });
    </script>
</body>
</html>
